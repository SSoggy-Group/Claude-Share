<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Primary Meta Tags -->
		<title>
			AI-Chat-Export - Share Your Claude AI Conversations With One Click
			Extension
		</title>
		<meta
			name="title"
			content="AI-Chat-Export - Share Your Claude AI Conversations Instantly | Browser Extension"
		/>
		<meta
			name="description"
			content="AI-Chat-Export is a Browser extension that lets you share Claude AI conversations instantly. Features include one-click sharing, syntax highlighting for code, Mermaid diagrams, and JSON support. Perfect for developers and teams using Claude AI."
		/>
		<meta name="author" content="Rohit Kumar" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://ai.ssoggy.me/" />
		<meta
			property="og:title"
			content="AI-Chat-Export - Share Your Claude AI Conversations With One Click"
		/>
		<meta
			property="og:description"
			content="Instantly share your Claude AI conversations with syntax highlighting for code, Mermaid diagrams, and JSON support. Free Browser extension for seamless AI chat sharing."
		/>
		<meta
			property="og:image"
			content="https://ai.ssoggy.me/preview.webp"
		/>
		<meta property="og:site_name" content="AI-Chat-Export" />
		<meta property="og:locale" content="en_US" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:url" content="https://ai.ssoggy.me/" />
		<meta
			name="twitter:title"
			content="AI-Chat-Export - Share Your Claude AI Conversations With One Click"
		/>
		<meta
			name="twitter:description"
			content="Instantly share your Claude AI conversations with syntax highlighting for code, Mermaid diagrams, and JSON support. Free Browser extension for seamless AI chat sharing."
		/>
		<meta
			name="twitter:image"
			content="https://ai.ssoggy.me/preview.webp"
		/>
		<meta name="twitter:creator" content="@maaren" />

		<!-- Additional Meta Tags -->
		<meta
			name="robots"
			content="index, follow, max-snippet:-1, max-image-preview:large"
		/>
		<meta name="googlebot" content="index, follow" />
		<link rel="canonical" href="https://ai.ssoggy.me/" />

		<!-- Structured Data -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "SoftwareApplication",
				"name": "AI-Chat-Export",
				"applicationCategory": "BrowserExtension",
				"operatingSystem": "Firefox",
				"offers": {
					"@type": "Offer",
					"price": "0",
					"priceCurrency": "USD"
				},
				"description": "Firefox extension for sharing Claude AI conversations with one click. Features include instant URL generation, syntax highlighting, and support for code and artifacts.",
				"url": "https://ai.ssoggy.me",
				"author": {
					"@type": "Person",
					"name": "Rohit Kumar",
					"sameAs": ["https://twitter.com/maaren"]
				},
				"downloadUrl": "https://addons.mozilla.org/firefox/addon/ai-chat-export/"
			}
		</script>
		<link rel="preconnect" href="https://addons.mozilla.org" />
		<link rel="dns-prefetch" href="https://addons.mozilla.org" />
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
